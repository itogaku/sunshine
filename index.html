<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Words — Sunshine英単語学習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #182849;
    --navy-deep: #101b34;
    --panel: #21335c;
    --panel-soft: #263a68;
    --sun: #ffc857;
    --sun-deep: #ffab2e;
    --mint: #35d0b8;
    --coral: #ff7a5c;
    --text: #eef2ff;
    --text-dim: #9fb0d6;
    --line: rgba(255,255,255,0.10);
    --r-lg: 22px;
    --r-md: 14px;
    --r-sm: 9px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Zen Kaku Gothic New', sans-serif;
    background:
      radial-gradient(circle at 12% -10%, rgba(255,200,87,0.16), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(53,208,184,0.10), transparent 40%),
      linear-gradient(180deg, var(--navy-deep), var(--navy) 60%);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:720px;margin:0 auto;padding:20px 16px 60px;}
  h1,h2,h3{font-family:'Zen Maru Gothic', sans-serif; margin:0;}
  .brandbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:50%;
    background:conic-gradient(from -40deg, var(--sun), var(--sun-deep), var(--coral), var(--sun));
    box-shadow:0 0 22px rgba(255,200,87,0.45);
    flex-shrink:0;
  }
  .brand-text{line-height:1.15;}
  .brand-text .en{font-family:'Zen Maru Gothic';font-weight:900;font-size:19px;letter-spacing:0.02em;}
  .brand-text .jp{font-size:11px;color:var(--text-dim);letter-spacing:0.05em;}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel);color:var(--text-dim);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:.15s;
  }
  .icon-btn:hover{color:var(--sun);border-color:var(--sun);}
  .icon-btn svg{width:19px;height:19px;}

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); padding:20px; margin-bottom:16px; }
  .section-label{ font-size:12px; letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; font-weight:700; }

  .grade-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .grade-card{ display:flex; align-items:center; gap:16px; background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); padding:18px 20px; cursor:pointer; transition:.15s; text-align:left; }
  .grade-card:hover{border-color:var(--sun); transform:translateY(-1px);}
  .grade-num{ font-family:'Zen Maru Gothic'; font-weight:900; font-size:30px; color:var(--navy-deep); width:56px;height:56px;border-radius:50%; display:flex;align-items:center;justify-content:center;flex-shrink:0; background:linear-gradient(135deg,var(--sun),var(--sun-deep)); }
  .grade-info{flex:1;min-width:0;}
  .grade-title{font-family:'Zen Maru Gothic'; font-weight:700; font-size:16px; margin-bottom:6px;}
  .grade-progress-track{height:7px;border-radius:5px;background:rgba(255,255,255,0.08);overflow:hidden;}
  .grade-progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--sun));border-radius:5px;}
  .grade-sub{font-size:11.5px;color:var(--text-dim);margin-top:6px;}
  .chev{color:var(--text-dim);font-size:20px;flex-shrink:0;}

  .week-row{ display:flex; align-items:center; gap:14px; padding:14px 4px; border-bottom:1px solid var(--line); }
  .week-row:last-child{border-bottom:none;}
  .week-badge{ width:34px;height:34px;border-radius:10px;flex-shrink:0; display:flex;align-items:center;justify-content:center;font-family:'Zen Maru Gothic';font-weight:900;font-size:13px; background:var(--panel-soft); color:var(--text-dim); }
  .week-row.active .week-badge{background:linear-gradient(135deg,var(--sun),var(--sun-deep)); color:var(--navy-deep);}
  .week-row.done .week-badge{background:rgba(53,208,184,0.18); color:var(--mint);}
  .week-body{flex:1;min-width:0;}
  .week-name{font-weight:700;font-size:14.5px;}
  .week-meta{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
  .week-track{height:5px;border-radius:4px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden;}
  .week-fill{height:100%;background:var(--mint);border-radius:4px;}

  .btn{ font-family:'Zen Maru Gothic'; font-weight:700; font-size:15px; border:none; border-radius:14px; padding:15px 20px; cursor:pointer; display:flex;align-items:center;justify-content:center;gap:8px; width:100%; transition:.12s; letter-spacing:.01em; }
  .btn-primary{background:linear-gradient(135deg,var(--sun),var(--sun-deep)); color:var(--navy-deep);}
  .btn-primary:hover{filter:brightness(1.05); transform:translateY(-1px);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary:disabled{opacity:.4; cursor:not-allowed; transform:none;}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn-ghost:hover{border-color:var(--text-dim);}

  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer;color:var(--text-dim);font-size:13.5px;}
  .back-row:hover{color:var(--text);}

  .setting-block{margin-bottom:22px;}
  .setting-title{font-family:'Zen Maru Gothic';font-weight:700;font-size:15px;margin-bottom:4px;}
  .setting-desc{font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{ padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:var(--panel-soft); color:var(--text); font-weight:700; font-size:14px; cursor:pointer; font-family:'Zen Maru Gothic'; }
  .chip.selected{background:linear-gradient(135deg,var(--sun),var(--sun-deep)); color:var(--navy-deep); border-color:transparent;}
  .chip-custom{display:flex;align-items:center;gap:6px;}
  .chip-custom input{ width:64px; background:var(--navy-deep); border:1px solid var(--line); border-radius:999px; color:var(--text); font-family:'JetBrains Mono'; text-align:center; padding:9px 6px; font-size:14px; }

  .stage-tag{ display:inline-block; font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:5px 12px; border-radius:999px; margin-bottom:14px; }
  .stage-tag.review{background:rgba(255,122,92,0.16); color:var(--coral);}
  .stage-tag.study{background:rgba(53,208,184,0.16); color:var(--mint);}
  .stage-tag.confirm{background:rgba(255,200,87,0.16); color:var(--sun);}
  .stage-tag.check{background:rgba(53,208,184,0.20); color:var(--mint);}
  .progress-dots{display:flex;gap:5px;margin-bottom:22px;flex-wrap:wrap;}
  .dot{flex:1;min-width:5px;height:5px;border-radius:4px;background:rgba(255,255,255,0.10);}
  .dot.wrong{background:var(--coral);}
  .dot.correct{background:var(--mint);}

  .word-stage{ text-align:center; padding:34px 10px 10px; }
  .word-stage .grade-chip{ display:inline-block;font-size:11px;color:var(--text-dim);border:1px solid var(--line); border-radius:999px;padding:3px 10px;margin-bottom:16px;font-weight:700; }
  .big-word{ font-family:'Zen Maru Gothic'; font-weight:900; font-size:40px; word-break:break-word; margin-bottom:6px; letter-spacing:.01em; }
  .meaning-txt{font-size:19px;color:var(--sun);font-weight:700;margin-bottom:10px;}
  .example-box{background:var(--navy-deep);border-radius:12px;padding:12px 16px;margin:14px 0 22px;text-align:left;}
  .example-en{font-family:'JetBrains Mono';font-size:14px;line-height:1.6;color:var(--text);}
  .example-ja{font-size:12.5px;color:var(--text-dim);margin-top:6px;line-height:1.5;}
  .blank-mark{display:inline-block;min-width:64px;height:1.1em;border-bottom:3px solid var(--sun);vertical-align:text-bottom;margin:0 2px;}

  .spell-input{ width:100%; background:var(--navy-deep); border:2px solid var(--line); border-radius:14px; color:var(--text); font-family:'JetBrains Mono'; font-size:22px; text-align:center; letter-spacing:.06em; padding:16px 12px; margin-bottom:16px; }
  .spell-input:focus{outline:none;border-color:var(--sun);}
  .spell-input.correct{border-color:var(--mint); color:var(--mint);}
  .spell-input.incorrect{border-color:var(--coral); color:var(--coral);}
  .feedback{min-height:26px;font-weight:700;margin-bottom:10px;font-size:14.5px;}
  .feedback.correct{color:var(--mint);}
  .feedback.incorrect{color:var(--coral);}

  .summary-icon{font-size:46px;margin-bottom:6px;}
  .summary-stats{display:flex;gap:10px;margin:20px 0;}
  .stat-box{flex:1;background:var(--panel-soft);border-radius:14px;padding:16px 8px;text-align:center;}
  .stat-num{font-family:'Zen Maru Gothic';font-weight:900;font-size:26px;}
  .stat-label{font-size:11px;color:var(--text-dim);margin-top:2px;}

  .empty-state{text-align:center;padding:30px 10px;color:var(--text-dim);font-size:13.5px;line-height:1.7;}
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--panel-soft); border:1px solid var(--line); color:var(--text); padding:10px 18px; border-radius:999px; font-size:13px; z-index:50; opacity:0; transition:.25s; pointer-events:none; }
  .toast.show{opacity:1;}

  .study-list{display:flex;flex-direction:column;gap:10px;}
  .study-item{background:var(--panel-soft);border-radius:14px;padding:14px 16px;}
  .study-item .w{font-family:'Zen Maru Gothic';font-weight:900;font-size:19px;}
  .study-item .m{color:var(--sun);font-size:14.5px;font-weight:700;margin-top:2px;}
  .study-item .ex{font-family:'JetBrains Mono';font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.5;}
  .study-item .exja{font-size:11.5px;color:var(--text-dim);margin-top:3px;opacity:.85;}
  .study-item.pending .m,.study-item.pending .ex,.study-item.pending .exja{color:var(--text-dim); opacity:.5;}
  .spinner{ width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--sun); animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin{to{transform:rotate(360deg);}}
  .week-row.selectable{cursor:pointer;}
  .week-row.selected{background:rgba(255,200,87,0.10); border-radius:12px; margin:0 -8px; padding:14px 8px;}
  .week-row.selected .week-badge{box-shadow:0 0 0 2px var(--sun);}
  .search-input{ width:100%; background:var(--navy-deep); border:2px solid var(--line); border-radius:14px; color:var(--text); font-family:'Zen Kaku Gothic New'; font-size:15px; padding:13px 16px; margin-bottom:14px; }
  .search-input:focus{outline:none;border-color:var(--sun);}
  .wl-item{background:var(--panel-soft);border-radius:14px;padding:12px 16px;margin-bottom:8px;}
  .wl-item .w{font-family:'Zen Maru Gothic';font-weight:900;font-size:16px;}
  .wl-item .m{color:var(--sun);font-size:13.5px;font-weight:700;margin-top:2px;}
  .wl-item .tag{font-size:10.5px;color:var(--text-dim);margin-top:3px;}
</style>
</head>

s.", "example_ja": "私は猫が好きです。"}, {"word": "Ms.", "grade": 1, "cat": "important", "meaning": "〜さん(女性)", "example_en": "This is Ms. Green.", "example_ja": "こちらはグリーンさんです。"}, {"word": "subject", "grade": 1, "cat": "important", "meaning": "教科", "example_en": "Math is my favorite subject.", "example_ja": "数学は私の好きな教科です。"}, {"word": "to", "grade": 1, "cat": "important", "meaning": "〜へ、〜に", "example_en": "I go to school.", "example_ja": "私は学校へ行きます。"}, {"word": "want", "grade": 1, "cat": "important", "meaning": "欲しい、したい", "example_en": "I want a new bike.", "example_ja": "私は新しい自転車が欲しいです。"}, {"word": "what", "grade": 1, "cat": "important", "meaning": "何", "example_en": "What is this?", "example_ja": "これは何ですか。"}, {"word": "when", "grade": 1, "cat": "important", "meaning": "いつ", "example_en": "When is your birthday?", "example_ja": "あなたの誕生日はいつですか。"}, {"word": "where", "grade": 1, "cat": "important", "meaning": "どこ", "example_en": "Where do you live?", "example_ja": "あなたはどこに住んでいますか。"}, {"word": "you", "grade": 1, "cat": "important", "meaning": "あなたは", "example_en": "You are kind.", "example_ja": "あなたは親切です。"}, {"word": "your", "grade": 1, "cat": "important", "meaning": "あなたの", "example_en": "What is your name?", "example_ja": "あなたの名前は何ですか。"}, {"word": "food", "grade": 1, "cat": "important", "meaning": "食べ物", "example_en": "I like Japanese food.", "example_ja": "私は和食が好きです。"}, {"word": "get", "grade": 1, "cat": "important", "meaning": "得る、着く", "example_en": "I get up at seven.", "example_ja": "私は7時に起きます。"}, {"word": "get up", "grade": 1, "cat": "phrase", "meaning": "起きる", "example_en": "I get up at seven every day.", "example_ja": "私は毎日7時に起きます。"}, {"word": "have", "grade": 1, "cat": "important", "meaning": "持っている", "example_en": "I have a dog.", "example_ja": "私は犬を飼っています。"}, {"word": "play", "grade": 1, "cat": "important", "meaning": "する、演奏する", "example_en": "I play tennis on Sunday.", "example_ja": "私は日曜日にテニスをします。"}, {"word": "time", "grade": 1, "cat": "important", "meaning": "時間", const CATS = [
  {key:'important',   label:'重要語',              short:'重要語',   week:1},
  {key:'elementary',  label:'小学校で学んだ単語',   short:'小学校語', week:2},
  {key:'other',       label:'それ以外の単語',       short:'その他',   week:3},
  {key:'phrase',      label:'熟語・フレーズ',       short:'熟語',     week:4},
];
const GRADES = [1,2,3];

const POOL = {};
for(const g of GRADES){ POOL[g] = {}; for(const c of CATS){ POOL[g][c.key] = []; } }
for(const item of VOCAB){ if(POOL[item.grade]) POOL[item.grade][item.cat].push(item.word); }

const DEFAULT_SETTINGS = { study: 20, review: 5 };
function emptyProgress(){
  const p = {};
  for(const g of GRADES) for(const c of CATS) p[`${g}_${c.key}`] = { idx:0, last:[] };
  return p;
}

let settings = {...DEFAULT_SETTINGS};
let progress = emptyProgress();
const defCache = {}; // word -> {meaning, example_en, example_ja}, built from bundled VOCAB data
for(const item of VOCAB){ defCache[item.word] = { meaning: item.meaning||'', example_en: item.example_en||'', example_ja: item.example_ja||'' }; }

async function loadState(){
  try{ const s = await window.storage.get('settings', false); if(s && s.value) settings = {...DEFAULT_SETTINGS, ...JSON.parse(s.value)}; }catch(e){}
  try{ const p = await window.storage.get('progress', false); if(p && p.value) progress = {...emptyProgress(), ...JSON.parse(p.value)}; }catch(e){}
}
async function saveSettings(){ try{ await window.storage.set('settings', JSON.stringify(settings), false); }catch(e){ showToast('設定の保存に失敗しました'); } }
async function saveProgress(){ try{ await window.storage.set('progress', JSON.stringify(progress), false); }catch(e){ showToast('進捗の保存に失敗しました'); } }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

function totalForGrade(g){ return CATS.reduce((s,c)=>s+POOL[g][c.key].length,0); }
function studiedForGrade(g){ return CATS.reduce((s,c)=>s+Math.min(progress[`${g}_${c.key}`].idx, POOL[g][c.key].length),0); }
function activeCatForGrade(g){ for(const c of CATS){ if(progress[`${g}_${c.key}`].idx < POOL[g][c.key].length) return c.key; } return null; }

let route = {screen:'home'};
const app = document.getElementById('app');
function nav(r){ route = r; render(); window.scrollTo(0,0); }

function render(){
  if(route.screen === 'home') return renderHome();
  if(route.screen === 'grade') return renderGrade(route.grade);
  if(route.screen === 'settings') return renderSettings();
  if(route.screen === 'session') return renderSession();
  if(route.screen === 'wordlist') return renderWordlist();
}

function buildChips(containerId, presets, key){
  const el = document.getElementById(containerId);
  function refresh(){
    el.innerHTML = '';
    presets.forEach(v=>{
      const chip = document.createElement('div');
      chip.className = 'chip' + (settings[key]===v ? ' selected':'');
      chip.textContent = v + '語';
      chip.onclick = ()=>{ settings[key]=v; refresh(); };
      el.appendChild(chip);
    });
    const isCustom = !presets.includes(settings[key]);
    const wrap = document.createElement('div');
    wrap.className = 'chip-custom';
    wrap.innerHTML = `<span style="font-size:12px;color:var(--text-dim);">その他</span>`;
    const input = document.createElement('input');
    input.type = 'number'; input.min = 1; input.max = 200;
    input.value = isCustom ? settings[key] : '';
    input.placeholder = '数値';
    input.oninput = ()=>{ const v = parseInt(input.value,10); if(v>0){ settings[key]=v; } };
    input.onblur = ()=>refresh();
    wrap.appendChild(input);
    el.appendChild(wrap);
  }
  refresh();
}

// ---------- definitions (bundled meaning + example, no network calls) ----------
function blankExample(en, word){
  if(!en) return '';
  const idx = en.toLowerCase().indexOf(word.toLowerCase());
  if(idx === -1) return en;
  return en.slice(0,idx) + '<span class="blank-mark"></span>' + en.slice(idx+word.length);
}

// ---------- session engine ----------
let session = null;
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function normalize(s){ return s.trim().toLowerCase().replace(/’/g,"'").replace(/\s+/g,' '); }

function startSession(g, catKey){
  if(!catKey) catKey = activeCatForGrade(g);
  if(!catKey) return;
  const p = progress[`${g}_${catKey}`];
  const lastWords = p.last || [];
  const reviewWords = lastWords.length ? shuffle(lastWords).slice(0, Math.min(settings.review, lastWords.length)) : [];
  session = { grade:g, catKey, stage: 'review', reviewWords, reviewIdx:0, wrongWords:[] };
  route = {screen:'session'};
  window.scrollTo(0,0);
  if(reviewWords.length){ render(); }
  else{ proceedToStudy(); }
}

function buildStudyBatch(){
  const g = session.grade, catKey = session.catKey;
  const pool = POOL[g][catKey];
  const p = progress[`${g}_${catKey}`];
  const wrong = session.wrongWords || [];
  const remainingSlots = Math.max(0, settings.study - wrong.length);
  const newWords = pool.slice(p.idx, p.idx + remainingSlots);
  session.newWordsCount = newWords.length;
  session.studyWords = wrong.concat(newWords);
}

function proceedToStudy(){
  buildStudyBatch();
  session.stage = 'study_list';
  render();
}

function renderSession(){
  if(session.stage === 'review') return renderReview();
  if(session.stage === 'study_list') return renderStudyList();
  if(session.stage === 'confirm_test' || session.stage === 'check_test') return renderTest();
  if(session.stage === 'summary') return renderSummary();
}

function backToGrade(){ const g = session ? session.grade : route.grade; session = null; nav({screen:'grade', grade:g}); }

function renderReview(){
  const cat = CATS.find(c=>c.key===session.catKey);
  const word = session.reviewWords[session.reviewIdx];
  const def = defCache[word] || {meaning:'',example_en:'',example_ja:''};
  const total = session.reviewWords.length;
  app.innerHTML = `
    <div class="back-row" id="back">← 中断してもどる</div>
    <span class="stage-tag review">前回の復習テスト ${session.reviewIdx+1} / ${total}</span>
    <div class="progress-dots">${session.reviewWords.map((w,i)=>{
      let cls='dot'; if(session._reviewResults && session._reviewResults[i]===true) cls+=' correct'; if(session._reviewResults && session._reviewResults[i]===false) cls+=' wrong';
      return `<div class="${cls}"></div>`;
    }).join('')}</div>
    <div class="card word-stage">
      <div class="grade-chip">${session.grade}年生・${cat.label}</div>
      <div class="meaning-txt">意味：${def.meaning}</div>
      ${def.example_en ? `<div class="example-box"><div class="example-en">${blankExample(def.example_en, word)}</div><div class="example-ja">${def.example_ja||''}</div></div>` : ''}
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">意味と例文の空欄に入る単語をスペル入力してください</div>
      <input class="spell-input" id="spellInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="スペルを入力"/>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-primary" id="btnCheck">こたえる</button>
    </div>`;
  document.getElementById('back').onclick = backToGrade;
  const input = document.getElementById('spellInput');
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('btnCheck');
  let answered = false;
  input.focus();
  function check(){
    if(answered) return next();
    answered = true;
    const correct = normalize(input.value) === normalize(word);
    if(!session._reviewResults) session._reviewResults = {};
    session._reviewResults[session.reviewIdx] = correct;
    if(correct){ input.classList.add('correct'); fb.textContent='正解！'; fb.className='feedback correct'; }
    else{ input.classList.add('incorrect'); fb.textContent=`不正解… 正しいスペル: ${word}`; fb.className='feedback incorrect'; session.wrongWords.push(word); }
    btn.textContent = session.reviewIdx+1 < total ? '次へ' : '単語学習へすすむ';
  }
  function next(){
    session.reviewIdx++;
    if(session.reviewIdx >= total){ proceedToStudy(); }
    else{ answered=false; render(); }
  }
  btn.onclick = check;
  input.onkeydown = (e)=>{ if(e.key==='Enter') check(); };
}

function renderStudyList(){
  const cat = CATS.find(c=>c.key===session.catKey);
  app.innerHTML = `
    <div class="back-row" id="back">← 中断してもどる</div>
    <span class="stage-tag study">単語学習</span>
    <h3 style="margin-bottom:6px;">${session.grade}年生・${cat.label}（${session.studyWords.length}語）</h3>
    <div class="setting-desc" style="margin-bottom:16px;">意味と例文を確認して、単語を覚えましょう。覚えたら確認テストに進みます。</div>
    <div class="study-list" id="studyListBox"></div>
    <div style="height:14px;"></div>
    <button class="btn btn-primary" id="btnToTest">確認テストにすすむ</button>`;
  document.getElementById('back').onclick = backToGrade;
  const box = document.getElementById('studyListBox');
  session.studyWords.forEach(w=>{
    const def = defCache[w] || {meaning:'',example_en:'',example_ja:''};
    const div = document.createElement('div');
    div.className = 'study-item';
    div.innerHTML = `
      <div class="w">${w}</div>
      <div class="m">${def.meaning}</div>
      ${def.example_en ? `<div class="ex">${def.example_en}</div><div class="exja">${def.example_ja||''}</div>` : ''}`;
    box.appendChild(div);
  });
  document.getElementById('btnToTest').onclick = ()=>{ startTestStage('confirm', session.studyWords.slice()); render(); };
}

function startTestStage(stageName, words){
  session.testStageName = stageName;
  session.testOrder = shuffle(words);
  session.testIdx = 0;
  session.testWrongThisRound = [];
  session.testResults = {}; // key: order idx -> bool, for current round dots
  session.testTotalInStage = words.length;
  session.testMasteredCount = 0;
  session.stage = stageName + '_test';
}

function renderTest(){
  const isConfirm = session.stage === 'confirm_test';
  const cat = CATS.find(c=>c.key===session.catKey);
  const word = session.testOrder[session.testIdx];
  const def = defCache[word] || {meaning:'',example_en:'',example_ja:''};
  const total = session.testOrder.length;
  app.innerHTML = `
    <div class="back-row" id="back">← 中断してもどる</div>
    <span class="stage-tag ${isConfirm?'confirm':'check'}">${isConfirm?'確認テスト':'チェックテスト'} ${session.testIdx+1} / ${total}</span>
    <div class="progress-dots">${session.testOrder.map((w,i)=>{
      let cls='dot'; if(session.testResults[i]===true) cls+=' correct'; if(session.testResults[i]===false) cls+=' wrong';
      return `<div class="${cls}"></div>`;
    }).join('')}</div>
    <div class="card word-stage">
      <div class="grade-chip">${session.grade}年生・${cat.label}</div>
      <div class="meaning-txt">意味：${def.meaning}</div>
      ${def.example_en ? `<div class="example-box"><div class="example-en">${blankExample(def.example_en, word)}</div><div class="example-ja">${def.example_ja||''}</div></div>` : ''}
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">意味と例文の空欄に入る単語をスペル入力してください</div>
      <input class="spell-input" id="spellInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="スペルを入力"/>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-primary" id="btnCheck">こたえる</button>
    </div>`;
  document.getElementById('back').onclick = backToGrade;
  const input = document.getElementById('spellInput');
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('btnCheck');
  let answered = false;
  input.focus();
  function check(){
    if(answered) return next();
    answered = true;
    const correct = normalize(input.value) === normalize(word);
    session.testResults[session.testIdx] = correct;
    if(correct){ input.classList.add('correct'); fb.textContent='正解！'; fb.className='feedback correct'; }
    else{ input.classList.add('incorrect'); fb.textContent=`不正解… 正しいスペル: ${word}`; fb.className='feedback incorrect'; session.testWrongThisRound.push(word); }
    btn.textContent = session.testIdx+1 < total ? '次へ' : '結果を見る';
  }
  function next(){
    session.testIdx++;
    if(session.testIdx >= total){
      if(session.testWrongThisRound.length === 0){
        onStagePass();
      }else{
        const retryWords = [...new Set(session.testWrongThisRound)];
        showToast(`もう一度、間違えた${retryWords.length}語に挑戦しましょう`);
        session.testOrder = shuffle(retryWords);
        session.testIdx = 0;
        session.testWrongThisRound = [];
        session.testResults = {};
        render();
      }
    }else{
      answered = false;
      render();
    }
  }
  btn.onclick = check;
  input.onkeydown = (e)=>{ if(e.key==='Enter') check(); };
}

function onStagePass(){
  if(session.stage === 'confirm_test'){
    const pool = session.studyWords.slice();
    const sampleSize = Math.min(5, pool.length);
    startTestStage('check', shuffle(pool).slice(0, sampleSize));
    render();
  }else{
    // check_test passed -> whole batch is 合格
    const g = session.grade, catKey = session.catKey;
    const p = progress[`${g}_${catKey}`];
    p.idx = Math.min(p.idx + session.newWordsCount, POOL[g][catKey].length);
    p.last = session.studyWords.slice();
    saveProgress();
    session.stage = 'summary';
    render();
  }
}

function renderSummary(){
  const cat = CATS.find(c=>c.key===session.catKey);
  const g = session.grade;
  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="summary-icon">🌅</div>
      <h2>合格！おつかれさまでした</h2>
      <div class="setting-desc" style="margin-top:6px;">${g}年生「${cat.label}」の確認テスト・チェックテストに全問正解しました。</div>
      <div class="summary-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--sun);">${session.newWordsCount}</div><div class="stat-label">新しく合格した単語</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--mint);">${session.studyWords.length}</div><div class="stat-label">今回学習した単語</div></div>
      </div>
    </div>
    <button class="btn btn-primary" id="btnHome">学年画面にもどる</button>`;
  document.getElementById('btnHome').onclick = ()=>{ session=null; nav({screen:'grade', grade:g}); };
}

// ---------- word list browser ----------
let wlFilter = { grade:'all', cat:'all', q:'' };
function renderWordlist(){
  app.innerHTML = `
    <div class="back-row" id="back">← もどる</div>
    <h2 style="margin-bottom:4px;">単語一覧</h2>
    <div class="setting-desc" style="margin-bottom:14px;">全${VOCAB.length}語をいつでも確認できます。</div>
    <div class="chip-row" id="gradeFilterChips" style="margin-bottom:10px;"></div>
    <div class="chip-row" id="catFilterChips" style="margin-bottom:14px;"></div>
    <input class="search-input" id="wlSearch" placeholder="単語やフレーズを検索..." />
    <div class="setting-desc" id="wlCount" style="margin-bottom:10px;"></div>
    <div class="study-list" id="wlBox"></div>
  `;
  document.getElementById('back').onclick = ()=>nav({screen:'home'});

  const gradeChipsEl = document.getElementById('gradeFilterChips');
  const gradeOptions = [{v:'all',label:'全学年'},{v:1,label:'1年生'},{v:2,label:'2年生'},{v:3,label:'3年生'}];
  function refreshGradeChips(){
    gradeChipsEl.innerHTML = '';
    gradeOptions.forEach(o=>{
      const chip = document.createElement('div');
      chip.className = 'chip' + (wlFilter.grade===o.v ? ' selected':'');
      chip.textContent = o.label;
      chip.onclick = ()=>{ wlFilter.grade=o.v; refreshGradeChips(); refreshList(); };
      gradeChipsEl.appendChild(chip);
    });
  }

  const catChipsEl = document.getElementById('catFilterChips');
  const catOptions = [{v:'all',label:'すべて'}, ...CATS.map(c=>({v:c.key,label:c.short}))];
  function refreshCatChips(){
    catChipsEl.innerHTML = '';
    catOptions.forEach(o=>{
      const chip = document.createElement('div');
      chip.className = 'chip' + (wlFilter.cat===o.v ? ' selected':'');
      chip.textContent = o.label;
      chip.onclick = ()=>{ wlFilter.cat=o.v; refreshCatChips(); refreshList(); };
      catChipsEl.appendChild(chip);
    });
  }

  const searchInput = document.getElementById('wlSearch');
  searchInput.value = wlFilter.q;
  searchInput.oninput = ()=>{ wlFilter.q = searchInput.value; refreshList(); };

  const box = document.getElementById('wlBox');
  const countEl = document.getElementById('wlCount');
  function refreshList(){
    const q = wlFilter.q.trim().toLowerCase();
    const results = VOCAB.filter(v=>{
      if(wlFilter.grade!=='all' && v.grade!==wlFilter.grade) return false;
      if(wlFilter.cat!=='all' && v.cat!==wlFilter.cat) return false;
      if(q && !v.word.toLowerCase().includes(q) && !(v.meaning||'').includes(q)) return false;
      return true;
    });
    countEl.textContent = `${results.length} 件`;
    box.innerHTML = '';
    const frag = document.createDocumentFragment();
    results.forEach(v=>{
      const cat = CATS.find(c=>c.key===v.cat);
      const div = document.createElement('div');
      div.className = 'wl-item';
      div.innerHTML = `
        <div class="w">${v.word}</div>
        <div class="m">${v.meaning}</div>
        ${v.example_en ? `<div class="ex">${v.example_en}</div><div class="exja">${v.example_ja||''}</div>` : ''}
        <div class="tag">${v.grade}年生・${cat ? cat.short : ''}</div>`;
      frag.appendChild(div);
    });
    box.appendChild(frag);
  }
  refreshGradeChips();
  refreshCatChips();
  refreshList();
}

// ---------- boot ----------
(async function(){
  app.innerHTML = `<div class="empty-state">読み込み中...</div>`;
  await loadState();
  nav({screen:'home'});
})();
</script>
</body>
</html>
